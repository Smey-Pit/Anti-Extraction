run_id: attack_new_ensemble_k1_llama32
phase: attack
seed: 42

data:
  data_dir: data/synthetic
  domain: synthetic
  n_images: 50
  image_size: [192, 768]
  split_filter: "debug"
  category_filter: null
  contrast_filter: null

attack:
  pgd_steps: 250
  pgd_step_size: 0.00062745    # 2.5 * (16/255) / 250

  mu_init: 0.1
  mu_growth: 1.05
  kappa: 9999.0                # overridden by kappa_sweep

  lambda_ce: 1.0
  lambda_align: 0.5
  objective: ce_and_align

  beta_edge: 1.0
  beta_stroke: 1.0
  beta_shape: 1.0
  beta_conf: 0.0
  proxy_stage: stage2

  region_aware: true
  epsilon_text: 0.06274510     # 16/255 — large budget, text pixels
  epsilon_bg:   0.00392157     # 1/255  — small budget, background pixels
  mask_dilation: 3
  epsilon:      0.06274510     # 16/255 — salience mode ceiling; fallback if region_aware: false
  epsilon_min:  0.01568627     # 4/255  — salience mode floor
  salience_budget: true

  ensemble_weighting: uniform

epsilon_sweep:
  - 0.01568627                 # 4/255
  - 0.03137255                 # 8/255
  - 0.06274509                 # 16/255

kappa_sweep:
  - 0.03
  - 0.05
  - 0.07

surrogates:
  # - name: internvl3_5
  #   model_id: OpenGVLab/InternVL3_5-8B
  #   dtype: bfloat16
  #   max_new_tokens: 256
  #   alpha: 1.0
  
  # - name: paligemma2
  #   model_id: google/paligemma2-3b-mix-448
  #   dtype: bfloat16
  #   max_new_tokens: 256
  #   alpha: 1.0
  
  - name: llama3_2
    model_id: meta-llama/Llama-3.2-11B-Vision-Instruct
    dtype: bfloat16
    max_new_tokens: 256
    alpha: 1.0
  

held_out_indices: []           # both surrogates in optimisation ensemble

log:
  output_dir: outputs
  save_images: true
  save_trajectories: true
  save_visual_diffs: true