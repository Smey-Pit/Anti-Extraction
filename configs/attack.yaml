run_id: attack_new_salience
phase: attack
seed: 42

data:
  data_dir: data/ui_dataset
  data_dir_additional: pil
  domain: "ui"
  n_images: 1
  image_size: null
  split_filter: "train"
  category_filter: null
  contrast_filter: null

attack:
  pgd_steps: 250
  pgd_step_size: 0.004    # 2.5 * (16/255) / 250

  mu_init: 0.1
  mu_growth: 1.05
  kappa: 9999.0                # overridden by kappa_sweep

  lambda_ce: 1.0
  lambda_align: 0.5
  objective: ce_and_align

  beta_edge: 1.0
  beta_stroke: 1.0
  beta_shape: 1.0
  beta_conf: 0.0
  proxy_stage: stage2

  region_aware: true
  epsilon_text: 1    # 16/255 — large budget, text pixels
  epsilon_bg:   1     # 1/255  — small budget, background pixels
  mask_dilation: 3
  epsilon:      1     # 16/255 — salience mode ceiling; fallback if region_aware: false
  epsilon_min:  1     # 4/255  — salience mode floor
  salience_budget: true
  # Indices into the full surrogate list (opt + held-out, in declaration order)
  # used to compute the salience map.  0-1 = opt surrogates (internvl3_5,
  # paligemma2); 2-4 reserved for held-out surrogates once held_out_indices
  # is populated.
  salience_surrogate_indices: [0, 1, 2, 3, 4]
  lazy_loading: false     # load/unload each surrogate per PGD step — required for OOM-safe salience
  salience_lazy: true    # load/unload each salience surrogate individually

  ensemble_weighting: uniform

epsilon_sweep:
  - 1

kappa_sweep:
  - 9999.0

surrogates:
  - name: internvl3_5
    model_id: OpenGVLab/InternVL3_5-8B
    dtype: bfloat16
    max_new_tokens: 256
    alpha: 1.0
  
  - name: paligemma2
    model_id: google/paligemma2-3b-mix-448
    dtype: bfloat16
    max_new_tokens: 256
    alpha: 1.0
  
  # - name: llama3_2
  #   model_id: meta-llama/Llama-3.2-11B-Vision-Instruct
  #   dtype: bfloat16
  #   max_new_tokens: 256
  #   alpha: 1.0
  

held_out_indices: [2]           # held_out indices are for those models that we can choose to not participate in the PGD attack

log:
  output_dir: outputs
  save_images: true
  save_trajectories: true
  save_visual_diffs: true