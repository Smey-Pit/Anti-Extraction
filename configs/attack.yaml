run_id: attack_high_budget
phase: attack_unconstrained
seed: 42

data:
  data_dir: data/ui_dataset
  data_dir_additional: pil
  domain: "ui"
  n_images: 1
  image_size: null
  split_filter: "train"
  category_filter: null
  contrast_filter: null

attack:
  pgd_steps: 250
  pgd_step_size: 0.00125    # 2.5 * (32/255) / 250

  mu_init: 0.1
  mu_growth: 1.05
  kappa: 9999.0             # readability constraint disabled

  lambda_ce: 1.0
  lambda_align: 0.5
  objective: ce_and_align

  beta_edge: 1.0
  beta_stroke: 1.0
  beta_shape: 1.0
  beta_conf: 0.0
  proxy_stage: stage2

  region_aware: true
  epsilon_text: 0.12549     # 32/255 — high text budget
  epsilon_bg:   0.06274     # 16/255 — elevated bg budget (readability not a concern)
  mask_dilation: 3
  epsilon:      0.12549     # 32/255 — salience ceiling
  epsilon_min:  0.06274     # 16/255 — salience floor (whole text region gets at least this)
  salience_budget: true
  salience_surrogate_indices: [0]   # only llama3_2 active
  lazy_loading: false
  salience_lazy: true

  ensemble_weighting: uniform

  eot:
    enabled: true
    n_samples: 8
    quality_min: 55
    quality_max: 95

epsilon_sweep:
  - 0.12549   # 32/255

kappa_sweep:
  - 9999.0

surrogates:
  - name: llama3_2
    model_id: meta-llama/Llama-3.2-11B-Vision-Instruct
    dtype: bfloat16
    max_new_tokens: 256
    alpha: 1.0

  # - name: qwen2_5vl
  #   model_id: Qwen/Qwen2.5-VL-3B-Instruct
  #   dtype: bfloat16
  #   max_new_tokens: 256
  #   alpha: 1.0

  # - name: internvl3_5
  #   model_id: OpenGVLab/InternVL3_5-8B
  #   dtype: bfloat16
  #   max_new_tokens: 256
  #   alpha: 1.0

  # - name: paligemma2
  #   model_id: google/paligemma2-3b-mix-448
  #   dtype: bfloat16
  #   max_new_tokens: 256
  #   alpha: 1.0

held_out_indices: []    # no held-out models with single surrogate

log:
  output_dir: outputs
  save_images: true
  save_trajectories: true
  save_visual_diffs: true
